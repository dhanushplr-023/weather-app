<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="top-bar">

        <button id="locationBtn">
            📍 Current Location
        </button>

        <button id="themeBtn">
            🌙
        </button>

    </div>

    <div class="search-box">

        <input
            type="text"
            id="cityInput"
            placeholder="Search city">

        <button id="searchBtn">
            Search
        </button>

    </div>

    <div id="loader" class="loader hidden"></div>

    <div class="weather-card">

        <h2 id="cityName">
            Search a city
        </h2>

        <p id="dateTime"></p>

        <img id="weatherIcon">

        <h1 id="temperature">
            --
        </h1>

        <p id="description">
            Weather Condition
        </p>

        <div class="details">

            <div class="detail-card">
                <h4>Humidity</h4>
                <p id="humidity">--</p>
            </div>

            <div class="detail-card">
                <h4>Wind</h4>
                <p id="wind">--</p>
            </div>

        </div>

    </div>

    <h3>3 Day Forecast</h3>

    <div id="forecastContainer"
         class="forecast-container">
    </div>

    <h3>Recent Searches</h3>

    <ul id="historyList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
