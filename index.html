<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <header>
        <h1>Weather Dashboard</h1>

        <div class="search-section">
            <input
                type="text"
                id="cityInput"
                placeholder="Search city..."
            >
            <button id="searchBtn">
                Search
            </button>
            <button id="locationBtn">
                📍 My Location
            </button>
        </div>
    </header>

    <div class="top-section">

        <div class="today-weather card">

            <h3>Today</h3>

            <h1 id="temperature">
                23°C
            </h1>

            <h2 id="cityName">
                Chennai
            </h2>

            <p id="condition">
                Partly Cloudy
            </p>
            <p id="humidity">Humidity: --</p>

            <p id="windSpeed">Wind: -- km/h</p>

            <p id="feelsLike">Feels Like: --°C</p>
        </div>

        <div class="rain-card card">

    <h3>Chance of Rain</h3>

    <div class="rain-bars">

        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>

    </div>

    <h2 id="rainPercent">
        0%
    </h2>

</div>

        </div>

    </div>

    <div class="forecast-section">

        <div class="forecast-card">Mon<br>☀️<br>23°C</div>
        <div class="forecast-card">Tue<br>🌤️<br>24°C</div>
        <div class="forecast-card">Wed<br>☁️<br>22°C</div>
        <div class="forecast-card">Thu<br>🌦️<br>21°C</div>
        <div class="forecast-card">Fri<br>☀️<br>25°C</div>

    </div>

    <div class="bottom-section">

        <div class="chart-card card">

            <h3>Temperature Trend</h3>

            <canvas id="tempChart"></canvas>

        </div>

        <div class="cities-card card">

            <h3>Recent Searches</h3>

<ul id="historyList">

</ul>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
