<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>Weather Dashboard</h1>
        </header>

        <div class="search-section">
            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name..."
            >

            <button id="searchBtn">
                Search
            </button>
        </div>

        <div class="weather-card">

            <h2 id="cityName">
                City Name
            </h2>

            <h3 id="temperature">
                23°C
            </h3>

            <p id="condition">
                Clear Sky
            </p>

            <p id="humidity">
                Humidity: 70%
            </p>

            <p id="windSpeed">
                Wind: 10 km/h
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
