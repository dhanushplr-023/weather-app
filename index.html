<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="weather-card">

            <div class="search-box">

                <input
                    type="text"
                    id="cityInput"
                    placeholder="Enter city name">

                <button id="searchBtn">
                    Search
                </button>

            </div>

            <div class="weather-info">

                <h2 id="cityName">
                    Search a City
                </h2>

                <h1 id="temperature">
                    --
                </h1>

                <p id="description">
                    Weather Condition
                </p>

                <div class="details">

                    <p id="humidity">
                        Humidity: --
                    </p>

                    <p id="wind">
                        Wind: --
                    </p>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
